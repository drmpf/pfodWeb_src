<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="white">
    <title>pfodWeb</title>
    <link rel="stylesheet" href="pfodCommon.css">
    <!-- Optional external font subsets (Cyrillic/Greek, and any
         user-added scripts such as Thai) — see extraFonts/pfodweb-extra-fonts.css.
         This file is fetched on a best-effort basis: if it's missing, the
         page still works fine, just without those extra script glyphs.
         Never inlined/rebuilt into pfodWeb.html, so users can add fonts by
         dropping files into extraFonts/ with zero rebuild. -->
    <link rel="stylesheet" href="extraFonts/pfodweb-extra-fonts.css">
</head>
<!-- pfodCommon.html -->
    <!-- version.js is loaded as a separate file so JS_VERSION is defined
         synchronously before pfodWeb.js bootstraps the .gz bundles.  Without
         this, pfodCommon.html's DOMContentLoaded handler runs before bundle
         001 finishes loading and leaves the version label as "Loading...".
         build-bundle.js (standalone) strips all <script src> tags and inlines
         version.js itself, so this tag has no effect on the standalone build. -->
    <script src="./version.js"></script>
    <script src="./pfodWeb.js"></script>
</body>
</html>
