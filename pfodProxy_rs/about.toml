# cargo-about configuration — generates THIRD_PARTY_LICENSES.md from the
# dependency tree so attribution / license-text obligations for every
# crate the binary statically links are satisfied automatically.
#
# Run:
#   cargo install cargo-about
#   cargo about generate about.hbs > THIRD_PARTY_LICENSES.md
#
# Re-run any time you bump a dependency in Cargo.toml.  The output is
# checked in alongside the source so end users picking up a release
# binary see the licenses without having to run cargo themselves.

# Licenses we accept in the dep tree.  cargo-about will hard-fail if any
# transitively-pulled crate carries a license not on this list.  Catches
# accidental GPL / AGPL / proprietary deps creeping in via a sub-tree.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",          # serialport — file-level copyleft, not viral
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "Unicode-3.0",      # icu_*  (transitive via some crates)
    "CC0-1.0",
    "0BSD",
    "Unlicense",
]

# Don't fail if some embedded license text isn't strictly SPDX-compliant
# — the more obscure crates sometimes use ad-hoc phrasing.
ignore-build-dependencies      = true
ignore-dev-dependencies        = true
ignore-transitive-dependencies = false
workarounds                    = []

# Per-crate clarifications go in their own table-keyed sections (the
# cargo-about 0.9 shape is `[clarifications.<crate-name>]`, not the
# older `[[clarify]]` array-of-tables form).  Add entries here only if
# `cargo about generate` reports an ambiguity for a specific crate.
